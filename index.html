<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // 사용자가 정한 파일 이름 규칙에 맞춘 매핑
        const languageMap = {
            'ko': 'privacy-policy-kor.html', // 한국어
            'en': 'privacy-policy-eng.html', // 영어 (기본값)
            'ja': 'privacy-policy-jpn.html', // 일본어
            'zh': 'privacy-policy-zho.html', // 중국어
            'es': 'privacy-policy-spa.html', // 스페인어
            'th': 'privacy-policy-tha.html'  // 태국어
        };

        // 브라우저 언어 감지 (예: 'ko-KR' -> 'ko')
        const userLang = (navigator.language || navigator.userLanguage).substring(0, 2).toLowerCase();

        // 매칭되는 언어가 있으면 이동, 없으면 영어(eng)를 기본값으로 사용
        const targetPage = languageMap[userLang] || languageMap['en'];

        // 페이지 이동 실행
        window.location.replace(targetPage);
    </script>
</head>
<body>
    <p>Redirecting to the privacy policy... If it doesn't move, 
       <a href="privacy-policy-eng.html">click here</a>.
    </p>
</body>
</html>
